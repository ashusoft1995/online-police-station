server.port=8080
spring.datasource.url=jdbc:h2:mem:policedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=policeSystemSecretKey2024MustBeAtLeast32BytesLongForHS256
jwt.expiration=86400000
app.dev.expose-reset-token=true

# Optional: configure SMTP to send real reset links (otherwise token is logged server-side)
# spring.mail.host=smtp.example.com
# spring.mail.username=
# spring.mail.password=
# spring.mail.port=587
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Serve uploaded files from local disk uploads folder
spring.web.resources.static-locations=classpath:/static/,file:uploads/,file:uploads/profiles/,file:uploads/cvs/